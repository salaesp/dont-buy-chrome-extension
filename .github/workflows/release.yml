name: Release

# Empaqueta la extensión y la adjunta como artifact de un Release.
# Disparo: push de un tag vX.Y.Z (ideal: que coincida con manifest.version).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # crear el release y subir el asset

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verifica que el tag coincida con la versión del manifest (evita
      # publicar un zip cuya versión no matchea el tag).
      - name: Check tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag ($TAG) no coincide con manifest.version ($MANIFEST)"
            exit 1
          fi

      # Solo los archivos que corren en el navegador (manifest en la raíz del
      # zip, como exige Chrome Web Store).
      - name: Build zip
        run: |
          ZIP="dont-buy-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP" manifest.json _locales icons src
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          unzip -l "$ZIP"

      # Usa el mensaje del tag anotado como cuerpo del release. Si el tag es
      # liviano (sin mensaje), cae a las notas autogeneradas.
      - name: Extract tag message
        id: notes
        run: |
          BODY=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          if [ -n "$BODY" ]; then
            echo "$BODY" > RELEASE_NOTES.md
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with zip
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          body_path: ${{ steps.notes.outputs.has_body == 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.has_body != 'true' }}
