name: Release

# Empaqueta la extensión y la adjunta como artifact de un Release.
# Disparo: push de un tag vX.Y.Z (ideal: que coincida con manifest.version).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # crear el release y subir el asset

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verifica que el tag coincida con la versión del manifest (evita
      # publicar un zip cuya versión no matchea el tag).
      - name: Check tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag ($TAG) no coincide con manifest.version ($MANIFEST)"
            exit 1
          fi

      # Solo los archivos que corren en el navegador (manifest en la raíz del
      # zip, como exige Chrome Web Store).
      - name: Build zip
        run: |
          ZIP="dont-buy-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP" manifest.json _locales icons src
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          unzip -l "$ZIP"

      # Cuerpo del release = mensaje del tag anotado. El checkout deja un tag
      # liviano (apunta al commit), así que traemos el objeto anotado para que
      # %(contents) sea el mensaje del TAG y no el del commit.
      - name: Notes from tag annotation
        run: |
          git fetch --force origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" || true
          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" \
            --format='%(contents)' > RELEASE_NOTES.md
          echo "----- notes -----"; cat RELEASE_NOTES.md

      # gh crea o EDITA el release (softprops no sobreescribe el body de uno
      # existente). Adjunta el zip con --clobber. Usa el GITHUB_TOKEN del runner.
      - name: Publish release with zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            NOTES=(--notes-file RELEASE_NOTES.md)
          else
            NOTES=(--generate-notes)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" "${NOTES[@]}"
            gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ZIP" "${NOTES[@]}"
          fi
