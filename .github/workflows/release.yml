name: Release

# Empaqueta la extensión y la adjunta como asset del Release.
# Disparo: publicación de un Release en GitHub (cuyo tag sea vX.Y.Z, idealmente
# coincidiendo con manifest.version).
on:
  release:
    types: [published]

permissions:
  contents: write # subir el asset al release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # Verifica que el tag del release coincida con la versión del manifest.
      - name: Check tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag ($TAG) no coincide con manifest.version ($MANIFEST)"
            exit 1
          fi

      # Solo los archivos que corren en el navegador (manifest en la raíz del
      # zip, como exige Chrome Web Store).
      - name: Build zip
        run: |
          ZIP="dont-buy-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP" manifest.json _locales icons src
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          unzip -l "$ZIP"

      # Adjunta el zip al release que disparó el workflow.
      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ env.ZIP }}
