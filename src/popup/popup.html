<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Don't Buy</title>
  </head>
  <body>
    <header>
      <span class="logo" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <polygon points="37,6 91,6 122,37 122,91 91,122 37,122 6,91 6,37" fill="#14b8a6" />
          <text x="64" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="76" fill="#fff">$</text>
        </svg>
      </span>
      <h1 data-i18n="brand">Don't Buy</h1>
    </header>

    <section class="toggle-row">
      <span data-i18n="enabledLabel">Avisos activados</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </section>

    <section class="site-row">
      <div class="site-info">
        <span class="site-label" data-i18n="thisSite">En este sitio</span>
        <span id="site-host" class="site-host">—</span>
      </div>
      <button id="toggle-site" class="site-btn">—</button>
    </section>

    <section class="product-row hidden" id="product-row">
      <button id="remove-from-list" class="link">—</button>
    </section>

    <section class="stats">
      <div class="stat">
        <strong id="block-count">0</strong>
        <span data-i18n="statDont">No necesito</span>
      </div>
      <div class="stat">
        <strong id="allow-count">0</strong>
        <span data-i18n="statNeed">Sí necesito</span>
      </div>
      <div class="stat">
        <strong id="blocked-total">0</strong>
        <span data-i18n="statBrakes">Frenos</span>
      </div>
    </section>

    <footer>
      <button id="open-options" class="link" data-i18n="manageLists">
        Gestionar mis listas →
      </button>
    </footer>

    <script src="../lib/product.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
